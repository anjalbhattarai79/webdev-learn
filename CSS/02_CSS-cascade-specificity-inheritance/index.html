<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selector</title>
    <link rel="stylesheet" href="style2.css">
            <!-- Here, applies cascade as well -->
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <h1>Hello world </h1>
    <p anjal="coder">My name is Anjal Bhattarai</p>
    <p anjal>Web Technologies</p>
    <ul>
        <li class="html" id="html">HTML</li>
        <li class="css" id="css">CSS</li>
        <li class="js" id="js">JavaScript</li>
        <li class="react" id="react">React</li>
        <li class="tw" id="tw">Tailwind</li>

        <p>Hi, My name is Something.</p>

        <font>
            <input type="button" value="submit me">
            <button>submit</button>
        </font>
        
    </ul>

<!-- 
 1. Cascade = value overwritten by below coming new RULE of CSS.
 2. Specificity = value overwritten by more specific selector. [1 , 10, 100 for  tag, class and id ]
 3. Inheritance = value is inherited by the child element from parent element.

-->
